<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0a0" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#022c22" stop-opacity="0.2" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#010603" />
  <!-- Outer Glow Ring -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="url(#glowGrad)" stroke-width="4" stroke-dasharray="16 8" />
  <!-- Inner Rounded box -->
  <rect x="48" y="48" width="416" height="416" rx="80" fill="#020d08" stroke="#059669" stroke-width="6" />
  <!-- Tech details inside -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#10b981" stroke-width="2" stroke-opacity="0.4" />
  <circle cx="256" cy="256" r="120" fill="none" stroke="#10b981" stroke-width="1" stroke-dasharray="4 4" stroke-opacity="0.5" />
  <!-- Text Logo <B /> in futuristic theme -->
  <text x="256" y="276" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-size="110" font-weight="900" fill="#00f0a0" text-anchor="middle" letter-spacing="-2">
    &lt;B/&gt;
  </text>
  <!-- Base label -->
  <text x="256" y="380" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700" fill="#059669" text-anchor="middle" letter-spacing="6">
    BUKARR
  </text>
</svg>
